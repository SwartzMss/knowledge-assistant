repo_name: SwartzMss/knowledge-assistant
repo_url: https://github.com/SwartzMss/knowledge-assistant
site_name: Knowledge Assistant Docs
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - About: about.md
  - Architecture: architecture/current-architecture.md

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - content.code.copy
    - navigation.top
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

validation:
  absolute_links: warn
  omitted_files: warn
  unrecognized_links: warn

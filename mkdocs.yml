repo_name: SwartzMss/knowledge-assistant
repo_url: https://github.com/SwartzMss/knowledge-assistant
site_name: Knowledge Assistant 开发文档
edit_uri: edit/main/docs/

nav:
  - 首页: index.md
  - 关于: about.md
  - 架构:
      - 当前架构: architecture/current-architecture.md
      - 目标架构: architecture/target-architecture.md
  - 开发者指南:
      - 总览: development/index.md
      - 代码库地图: development/codebase-map.md
      - 运行时流程: development/runtime-flows.md
      - 数据与配置: development/data-and-configuration.md
      - 质量与风险: development/quality-and-risks.md
      - 实施路线图: development/roadmap.md

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - content.code.copy
    - navigation.top
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

validation:
  absolute_links: warn
  omitted_files: warn
  unrecognized_links: warn
